<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора | BlueClinik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #F4F2EF;
            --card-bg: #FFFFFF;
            --primary-dark: #0A1C2F;
            --primary-medium: #1F3E5C;
            --accent: #C89F9F;
            --accent-light: #F1E6E6;
            --text-dark: #1A2C3A;
            --text-medium: #5D6F7F;
            --text-light: #919EAB;
            --success: #4CAF50;
            --warning: #FFA726;
            --danger: #EF5350;
            --shadow: 0 8px 28px -6px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 20px 32px -12px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-dark);
        }

        /* Header */
        .admin-header {
            background: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            color: var(--primary-dark);
        }

        .logo span {
            color: var(--accent);
        }

        .admin-badge {
            background: var(--accent-light);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-weight: 500;
            border-radius: 60px;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary-dark);
            color: var(--primary-dark);
        }

        .btn-outline:hover {
            background: var(--primary-dark);
            color: white;
        }

        .btn-primary {
            background: var(--primary-dark);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-medium);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c62828;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* Main content */
        .admin-main {
            padding: 40px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-info p {
            color: var(--text-medium);
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--card-bg);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 15px;
            box-shadow: var(--shadow);
        }

        .tab-btn.active {
            background: var(--primary-dark);
            color: white;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tables */
        .data-table {
            background: var(--card-bg);
            border-radius: 24px;
            overflow-x: auto;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #E8E3DC;
        }

        th {
            background: #F8F6F3;
            font-weight: 600;
            color: var(--primary-dark);
        }

        tr:hover {
            background: var(--accent-light);
        }

        .status {
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-upcoming {
            background: #E3F2FD;
            color: #1976D2;
        }

        .status-completed {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .icon-btn.delete {
            color: var(--danger);
        }

        .icon-btn.delete:hover {
            background: #FFEBEE;
        }

        .icon-btn.edit {
            color: var(--warning);
        }

        .icon-btn.edit:hover {
            background: #FFF3E0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 24px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E8E3DC;
            border-radius: 60px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-medium);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--accent-light);
        }

        /* Search */
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #E8E3DC;
            border-radius: 60px;
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            th, td {
                padding: 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<header class="admin-header">
    <div class="container">
        <div class="admin-nav">
            <a href="index.html" class="logo">Blue<span>Clinik</span></a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span class="admin-badge"><i class="fas fa-shield-alt"></i> Администратор</span>
                <span id="adminName" style="font-weight: 500;"></span>
                <button onclick="logout()" class="btn btn-outline">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>
</header>

<main class="admin-main">
    <div class="container">
        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p>Всего клиентов</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                    <h3 id="totalAppointments">0</h3>
                    <p>Всего записей</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-info">
                    <h3 id="upcomingAppointments">0</h3>
                    <p>Предстоящих</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-ruble-sign"></i></div>
                <div class="stat-info">
                    <h3 id="totalRevenue">0</h3>
                    <p>Выручка (₽)</p>
                </div>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="appointments">📅 Записи</button>
            <button class="tab-btn" data-tab="users">👥 Пользователи</button>
        </div>

        <!-- Вкладка: Записи -->
        <div class="tab-pane active" id="appointmentsTab">
            <div class="search-bar">
                <input type="text" id="appointmentSearch" placeholder="Поиск по клиенту, услуге или врачу...">
            </div>
            <div class="data-table">
                <div id="appointmentsTableContainer"></div>
            </div>
        </div>

        <!-- Вкладка: Пользователи -->
        <div class="tab-pane" id="usersTab">
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Поиск по имени или email...">
            </div>
            <div class="data-table">
                <div id="usersTableContainer"></div>
            </div>
        </div>
    </div>
</main>

<!-- Модальное окно редактирования записи -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Редактирование записи</h3>
        <input type="hidden" id="editAppointmentId">
        <input type="hidden" id="editUserId">
        <input type="text" id="editService" placeholder="Услуга">
        <input type="date" id="editDate">
        <input type="time" id="editTime">
        <input type="text" id="editDoctor" placeholder="Врач">
        <div class="modal-buttons">
            <button class="btn btn-primary" onclick="saveAppointmentEdit()">Сохранить</button>
            <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script>
    // === ПРОВЕРКА ПРАВ АДМИНИСТРАТОРА ===
    const currentUser = getCurrentUser();
    
    function checkAdminAccess() {
        if (!currentUser) {
            window.location.href = 'login.html';
            return false;
        }
        
        // Проверка: является ли пользователь админом
        const isAdminEmail = currentUser.email === 'yusupova25@yandex.ru';
        const hasAdminFlag = currentUser.isAdmin === true;
        
        if (!isAdminEmail && !hasAdminFlag) {
            alert('Доступ запрещён. Только для администраторов.');
            window.location.href = 'dashboard.html';
            return false;
        }
        
        document.getElementById('adminName').textContent = currentUser.fullname;
        return true;
    }
    
    if (!checkAdminAccess()) {
        // Останавливаем выполнение, если не админ
        throw new Error('Access denied');
    }
    
    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function getAllUsers() {
        return JSON.parse(localStorage.getItem('blueclinik_users') || '[]');
    }
    
    function saveAllUsers(users) {
        localStorage.setItem('blueclinik_users', JSON.stringify(users));
    }
    
    // Получить все записи всех пользователей
    function getAllAppointments() {
        const users = getAllUsers();
        const allAppointments = [];
        
        users.forEach(user => {
            const userAppointments = JSON.parse(localStorage.getItem(`appointments_${user.id}`) || '[]');
            userAppointments.forEach(apt => {
                allAppointments.push({
                    ...apt,
                    userId: user.id,
                    userFullname: user.fullname,
                    userEmail: user.email,
                    userPhone: user.phone
                });
            });
        });
        
        return allAppointments.sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));
    }
    
    // Сохранить записи конкретного пользователя
    function saveUserAppointments(userId, appointments) {
        localStorage.setItem(`appointments_${userId}`, JSON.stringify(appointments));
    }
    
    // Обновить статистику
    function updateStats() {
        const users = getAllUsers();
        const appointments = getAllAppointments();
        const now = new Date();
        
        const upcoming = appointments.filter(apt => new Date(apt.date + 'T' + apt.time) > now);
        
        // Подсчёт выручки (только завершённые или все? считаем все)
        const revenue = appointments.reduce((sum, apt) => sum + (apt.price || 0), 0);
        
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalAppointments').textContent = appointments.length;
        document.getElementById('upcomingAppointments').textContent = upcoming.length;
        document.getElementById('totalRevenue').textContent = revenue.toLocaleString();
    }
    
    // Форматирование даты
    function formatDate(dateStr) {
        const months = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
        const [year, month, day] = dateStr.split('-');
        return `${parseInt(day)} ${months[parseInt(month) - 1]} ${year}`;
    }
    
    // === ОТРИСОВКА ТАБЛИЦЫ ЗАПИСЕЙ ===
    function renderAppointmentsTable(searchTerm = '') {
        let appointments = getAllAppointments();
        
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            appointments = appointments.filter(apt => 
                apt.userFullname?.toLowerCase().includes(term) ||
                apt.userEmail?.toLowerCase().includes(term) ||
                apt.service?.toLowerCase().includes(term) ||
                apt.doctor?.toLowerCase().includes(term)
            );
        }
        
        const container = document.getElementById('appointmentsTableContainer');
        const now = new Date();
        
        if (appointments.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-times"></i>
                    <p>Записей не найдено</p>
                </div>
            `;
            return;
        }
        
        let html = `
            <table>
                <thead>
                    <tr><th>Клиент</th><th>Услуга</th><th>Врач</th><th>Дата</th><th>Время</th><th>Стоимость</th><th>Статус</th><th>Действия</th></tr>
                </thead>
                <tbody>
        `;
        
        appointments.forEach(apt => {
            const aptDateTime = new Date(apt.date + 'T' + apt.time);
            const isUpcoming = aptDateTime > now;
            const statusClass = isUpcoming ? 'status-upcoming' : 'status-completed';
            const statusText = isUpcoming ? 'Предстоит' : 'Завершена';
            
            html += `
                <tr>
                    <td><strong>${apt.userFullname || '—'}</strong><br><small style="color:var(--text-light)">${apt.userEmail || ''}</small></td>
                    <td>${apt.service || '—'}</td>
                    <td>${apt.doctor || '—'}</td>
                    <td>${formatDate(apt.date)}</td>
                    <td>${apt.time}</td>
                    <td>${(apt.price || 0).toLocaleString()} ₽</td>
                    <td><span class="status ${statusClass}">${statusText}</span></td>
                    <td class="action-btns">
                        <button class="icon-btn edit" onclick="openEditModal(${apt.id}, ${apt.userId})" title="Редактировать">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button class="icon-btn delete" onclick="deleteAppointment(${apt.id}, ${apt.userId})" title="Удалить">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
    
    // === ОТРИСОВКА ТАБЛИЦЫ ПОЛЬЗОВАТЕЛЕЙ ===
    function renderUsersTable(searchTerm = '') {
        let users = getAllUsers();
        
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            users = users.filter(user => 
                user.fullname?.toLowerCase().includes(term) ||
                user.email?.toLowerCase().includes(term) ||
                user.phone?.toLowerCase().includes(term)
            );
        }
        
        const container = document.getElementById('usersTableContainer');
        
        if (users.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-users-slash"></i>
                    <p>Пользователей не найдено</p>
                </div>
            `;
            return;
        }
        
        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>ФИО</th><th>Email</th><th>Телефон</th><th>Дата регистрации</th><th>Записей</th><th>Действия</th></tr>
                </thead>
                <tbody>
        `;
        
        users.forEach(user => {
            const userAppointments = JSON.parse(localStorage.getItem(`appointments_${user.id}`) || '[]');
            const appointmentsCount = userAppointments.length;
            const isAdmin = (user.email === 'yusupova25@yandex.ru');
            
            html += `
                <tr>
                    <td>${user.id}</td>
                    <td><strong>${user.fullname || '—'}</strong></td>
                    <td>${user.email || '—'}</td>
                    <td>${user.phone || '—'}</td>
                    <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString('ru-RU') : '—'}</td>
                    <td>${appointmentsCount}</td>
                    <td class="action-btns">
                        ${!isAdmin ? `
                            <button class="icon-btn delete" onclick="deleteUser(${user.id})" title="Удалить пользователя">
                                <i class="fas fa-user-minus"></i>
                            </button>
                        ` : '<span style="color:var(--accent)">Админ</span>'}
                    </td>
                </tr>
            `;
        });
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
    
    // === РЕДАКТИРОВАНИЕ ЗАПИСИ ===
    function openEditModal(appointmentId, userId) {
        const appointments = getAllAppointments();
        const appointment = appointments.find(apt => apt.id === appointmentId && apt.userId === userId);
        
        if (appointment) {
            document.getElementById('editAppointmentId').value = appointmentId;
            document.getElementById('editUserId').value = userId;
            document.getElementById('editService').value = appointment.service || '';
            document.getElementById('editDate').value = appointment.date || '';
            document.getElementById('editTime').value = appointment.time || '';
            document.getElementById('editDoctor').value = appointment.doctor || '';
            document.getElementById('editModal').classList.add('active');
        }
    }
    
    function saveAppointmentEdit() {
        const appointmentId = parseInt(document.getElementById('editAppointmentId').value);
        const userId = parseInt(document.getElementById('editUserId').value);
        const newService = document.getElementById('editService').value;
        const newDate = document.getElementById('editDate').value;
        const newTime = document.getElementById('editTime').value;
        const newDoctor = document.getElementById('editDoctor').value;
        
        let userAppointments = JSON.parse(localStorage.getItem(`appointments_${userId}`) || '[]');
        const index = userAppointments.findIndex(apt => apt.id === appointmentId);
        
        if (index !== -1) {
            userAppointments[index] = {
                ...userAppointments[index],
                service: newService,
                date: newDate,
                time: newTime,
                doctor: newDoctor
            };
            saveUserAppointments(userId, userAppointments);
            closeModal();
            renderAppointmentsTable(document.getElementById('appointmentSearch').value);
            updateStats();
            showNotification('Запись обновлена');
        }
    }
    
    // === УДАЛЕНИЕ ЗАПИСИ ===
    function deleteAppointment(appointmentId, userId) {
        if (confirm('Удалить эту запись?')) {
            let userAppointments = JSON.parse(localStorage.getItem(`appointments_${userId}`) || '[]');
            userAppointments = userAppointments.filter(apt => apt.id !== appointmentId);
            saveUserAppointments(userId, userAppointments);
            renderAppointmentsTable(document.getElementById('appointmentSearch').value);
            updateStats();
            showNotification('Запись удалена');
        }
    }
    
    // === УДАЛЕНИЕ ПОЛЬЗОВАТЕЛЯ ===
    function deleteUser(userId) {
        const user = getAllUsers().find(u => u.id === userId);
        if (!user) return;
        
        if (confirm(`Удалить пользователя "${user.fullname}"? Все его записи также будут удалены.`)) {
            // Удаляем записи пользователя
            localStorage.removeItem(`appointments_${userId}`);
            
            // Удаляем пользователя из списка
            let users = getAllUsers();
            users = users.filter(u => u.id !== userId);
            saveAllUsers(users);
            
            renderUsersTable(document.getElementById('userSearch').value);
            updateStats();
            showNotification('Пользователь удалён');
        }
    }
    
    function closeModal() {
        document.getElementById('editModal').classList.remove('active');
    }
    
    function showNotification(message) {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-dark);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
            box-shadow: var(--shadow-hover);
        `;
        notification.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 2500);
    }
    
    // === ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ===
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
                
                // Обновляем данные при переключении
                if (btn.dataset.tab === 'users') {
                    renderUsersTable(document.getElementById('userSearch').value);
                } else {
                    renderAppointmentsTable(document.getElementById('appointmentSearch').value);
                }
            });
        });
    }
    
    // === ПОИСК ===
    function initSearch() {
        const appointmentSearch = document.getElementById('appointmentSearch');
        const userSearch = document.getElementById('userSearch');
        
        appointmentSearch.addEventListener('input', () => {
            renderAppointmentsTable(appointmentSearch.value);
        });
        
        userSearch.addEventListener('input', () => {
            renderUsersTable(userSearch.value);
        });
    }
    
    // === ЗАКРЫТИЕ МОДАЛКИ ПО ESC ===
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });
    
    // === ИНИЦИАЛИЗАЦИЯ ===
    function init() {
        initTabs();
        initSearch();
        updateStats();
        renderAppointmentsTable('');
        renderUsersTable('');
    }
    
    init();
</script>
</body>
</html>
